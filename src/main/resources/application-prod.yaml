spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
logging:
  level:
    root: WARN
    com.yourpackage: INFO

mailtrap:
  api-token: ${MAILTRAP_API_TOKEN:}

