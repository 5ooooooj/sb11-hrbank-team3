spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate  # prod는 validate (스키마 자동 변경 X)
    show-sql: false
  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.yourpackage: INFO

mailtrap:
  api-token: ${MAILTRAP_API_TOKEN:}

