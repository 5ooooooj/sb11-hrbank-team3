spring:
  application:
    name: hrbank3
  profiles:
    active: local
  mvc:
    format:
      date-time: iso
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads/}

backup:
  dir: ${BACKUP_DIR:./backups/}
  chunk-size: 500
  schedule:
    cron: "0 0 * * * *"

notification:
  admin-email: ${NOTIFICATION_ADMIN_EMAIL:admin@hrbank.com}

mailtrap:
  api-token: ${MAILTRAP_API_TOKEN:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never